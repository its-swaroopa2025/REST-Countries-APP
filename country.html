
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Page</title>
    <link rel="stylesheet" href="country.css">
    <script src="country.js" defer></script>
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,regular,500,600,700,800,900" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="header-container">
        <div class="header-content"> <h2 class="title"><a href="/"><span><i class="fa-solid fa-house"></i></span>&nbsp;Where in the WORLD</a></h2>
    <p class="moon"><i class="fa-regular fa-moon"></i>&nbsp;Dark Mode</p>
    
    <p class="sun"><i class="fa-regular fa-sun"></i> Light Mode</p>
</div>
    </header>

<main> 
    <div class="country-details-container">
<span class="back-button" onclick="history.back()"><i class="fa-solid fa-circle-arrow-left"></i>&nbsp;
Back</span>
      
<div class="country-details">
    <img src="https://flagcdn.com/is.svg" alt="flag">
    <div class="details-text-container">
        <h1 class="country-name">Iceland</h1>
       <div class="details-text">
              <p><b>Native Name: </b><span class="native-name"></span></p>
              <p><b>Population: </b><span class="population"></span></p>
              <p><b>Region: </b><span class="region"></span></p>
              <p><b>Sub Region: </b><span class="sub-region"></span></p>
              <p><b>Capital: </b><span class="capital"></span></p>
              <p>
                <b>Top Level Domain: </b><span class="top-level-domain"></span>
              </p>
              <p><b>Currencies: </b><span class="currencies"></span></p>
              <p><b>Languages: </b><span class="languages"></span></p>
            </div>
<div class="border-countries"><b>Border Countries:</b>&nbsp;</div>
</div>
        </div>
        </div>
    </div>


    </main>
    
</body>
</html>
